        import * as THREE from 'three';

        import { OrbitControls, Grid, Center, PerspectiveCamera } from '@react-three/drei';

        // --- 3D Components ---
        
        const BoxMesh = ({ position, args, color }) => {
            return (
                <group position={position}>
                    {/* 实心盒子 - 添加 polygonOffset 防止与边线重叠 */}
                    <mesh>
                        <boxGeometry args={args} />
                        <meshStandardMaterial 
                            color={color} 
                            roughness={0.5} 
                            polygonOffset 
                            polygonOffsetFactor={1} 
                            polygonOffsetUnits={1}
                        />
                    </mesh>
                    {/* 黑色边框，增强立体感 - 颜色改为黑色，提高不透明度 */}
                    <lineSegments>
                        <edgesGeometry args={[new THREE.BoxGeometry(...args)]} />
                        <lineBasicMaterial color="#000000" linewidth={1} opacity={0.6} transparent />
                    </lineSegments>
                </group>
            );
        };

        const PackingScene = ({ layout }) => {
            const { 
                unitDims, // [长, 高, 宽] 
                cartonDims, // [长, 高, 宽]
                rows, // 长方向数量 (x)
                cols, // 宽方向数量 (z)
                stack, // 高方向数量 (y)
                gap = 0.05 // 间隙
            } = layout;

            // 动态缩放比例，让物体始终处于合适的可视范围内
            const maxDim = Math.max(cartonDims[0], cartonDims[1], cartonDims[2]);
            const scale = maxDim > 0 ? 10 / maxDim : 0.1;
            
            const uW = unitDims[0] * scale; // X轴: 长
            const uH = unitDims[1] * scale; // Y轴: 高
            const uD = unitDims[2] * scale; // Z轴: 宽

            const cW = cartonDims[0] * scale;
            const cH = cartonDims[1] * scale;
            const cD = cartonDims[2] * scale;

            const boxes = [];
            
            const totalContentW = rows * uW;
            const totalContentH = stack * uH;
            const totalContentD = cols * uD;
            
            const startX = -totalContentW / 2 + uW / 2;
            const startY = -totalContentH / 2 + uH / 2;
            const startZ = -totalContentD / 2 + uD / 2;

            if (rows > 0 && cols > 0 && stack > 0) {
                let count = 0;
                for (let i = 0; i < rows; i++) {
                    for (let k = 0; k < cols; k++) {
                        for (let j = 0; j < stack; j++) {
                            count++;
                            
                            // 颜色逻辑：交替色增强区分度
                            const isStacked = stack > 1; 
                            const boxColor = isStacked 
                                ? (j % 2 === 0 ? "#3b82f6" : "#93c5fd") 
                                : "#3b82f6";

                            // 极简剔除
                            const isVisible = 
                                i === 0 || i === rows - 1 ||
                                j === 0 || j === stack - 1 ||
                                k === 0 || k === cols - 1;

                            if (rows * cols * stack > 1000 && !isVisible) continue;

                            boxes.push(
                                <BoxMesh 
                                    key={`${i}-${j}-${k}`}
                                    position={[
                                        startX + i * uW, 
                                        startY + j * uH, 
                                        startZ + k * uD
                                    ]} 
                                    args={[uW - gap, uH - gap, uD - gap]}
                                    color={boxColor}
                                />
                            );
                        }
                    }
                }
            } else {
                 boxes.push(
                    <BoxMesh 
                        key="bulk"
                        position={[0,0,0]} 
                        args={[cW - 0.2, cH - 0.2, cD - 0.2]}
                        color="#60a5fa"
                    />
                 )
            }

            return (
                <>
                    <ambientLight intensity={0.7} />
                    <pointLight position={[10, 20, 10]} intensity={1} />
                    <pointLight position={[-10, 10, 20]} intensity={0.8} />
                    
                    <Center>
                        <group>
                            {boxes}
                            <mesh>
                                <boxGeometry args={[cW, cH, cD]} />
                                <meshBasicMaterial color="#ef4444" wireframe={true} transparent opacity={0.3} />
                            </mesh>
                             <mesh>
                                <boxGeometry args={[cW, cH, cD]} />
                                <meshBasicMaterial color="#ef4444" transparent opacity={0.05} depthWrite={false} />
                            </mesh>
                        </group>
                    </Center>
                    <Grid infiniteGrid sectionColor="#696969" cellColor="#a1a1a1" fadeDistance={40} position={[0, -cH/2 - 0.5, 0]} />
                    <OrbitControls makeDefault autoRotate autoRotateSpeed={1} />
                    <PerspectiveCamera makeDefault position={[10, 10, 10]} fov={45} />
                </>
            );
        };

                    let hasLargestEdgeReason = false;

                    if (activeTab === 'foldable_magnet') {
                        const fixedWidth = foldMagInputs.W * 2 + foldMagInputs.H * 3 + 6;
                        if (fixedWidth > sortedLimits[0] + 0.001) {
                            reasons.push(replaceTemplate(t('singleBoxFixedWidthMaxEdge'), {
                                value: formatMetric(fixedWidth),
                                limit: formatMetric(sortedLimits[0]),
                            }));
                            hasLargestEdgeReason = true;
                        }
                    }

                    if (!hasLargestEdgeReason && diagnosticStats.minLargestEdge > sortedLimits[0] + 0.001) {
                        reasons.push(replaceTemplate(t('singleBoxMinLargestExceeded'), {
                            value: formatMetric(diagnosticStats.minLargestEdge),
                            limit: formatMetric(sortedLimits[0]),
                        }));
                    }

                    if (diagnosticStats.minMiddleEdge > sortedLimits[1] + 0.001) {
                        reasons.push(replaceTemplate(t('singleBoxMinMiddleExceeded'), {
                            value: formatMetric(diagnosticStats.minMiddleEdge),
                            limit: formatMetric(sortedLimits[1]),
                        }));
                    }

                    if (diagnosticStats.minSmallestEdge > sortedLimits[2] + 0.001) {
                        reasons.push(replaceTemplate(t('singleBoxMinSmallestExceeded'), {
                            value: formatMetric(diagnosticStats.minSmallestEdge),
                            limit: formatMetric(sortedLimits[2]),
                        }));
                    }

                    if (diagnosticStats.minGrossWeight > maxWeight + 0.001) {
                        reasons.push(replaceTemplate(t('singleBoxMinGrossExceeded'), {
                            value: formatMetric(diagnosticStats.minGrossWeight),
                            limit: formatMetric(maxWeight),
                        }));
                    }

                    if (diagnosticStats.minVolWeight > maxVolWeight + 0.001) {
                        reasons.push(replaceTemplate(t('singleBoxMinVolExceeded'), {
                            value: formatMetric(diagnosticStats.minVolWeight),
                            limit: formatMetric(maxVolWeight),
                        }));
                    }

                    if (!reasons.length) {
                        reasons.push(t('singleBoxNoPlanFallback'));
                    }

                    return `${t('noPlanFound')}\n${t('noPlanFoundDetailsIntro')}\n${reasons.map((reason, index) => `${index + 1}. ${reason}`).join('\n')}`;
                };

                const calculateMagnetResult = (inputs) => {
                    const { L, W, H, Qty, Paper, Board, PerCarton, Rows, Cols } = inputs;
                    const safeRows = Rows || 1;
                    const safeCols = Cols || 1;
                    const safePerCarton = PerCarton || 1;

                    const skinL = L;
                    const skinW = W * 2 + H * 3;
                    const innerArea = ((L * (W + 2 * H)) + W * H * 2) / 10000;
                    const innerWeight = (Paper * 2 + Board) * innerArea;
                    const skinWeight = ((skinL * skinW) / 10000) * (Paper * 2 + Board);
                    const unitWeight = innerWeight + skinWeight;

                    const cartonGrossWeight = (PerCarton * unitWeight / 1000) + 1;
                    const cartonL = L * Rows + 4;
                    const cartonW = W * Cols + 4;
                    const cartonH = (PerCarton / safeRows / safeCols) * H + 4;
                    const cartonCBM = (cartonL * cartonW * cartonH) / 1000000;
                    const volWeight = (cartonL * cartonW * cartonH) / volDivisor;
                    const cartonCount = Math.ceil(Qty / safePerCarton);
                    const singleBoxChargeable = Math.max(cartonGrossWeight, volWeight);
                    const totalChargeable = cartonCount * singleBoxChargeable;

                    return {
                        cartonL, cartonW, cartonH, cartonCBM, cartonGrossWeight, volWeight,
                        singleBoxChargeable, totalChargeable
                    };
                };

                const calculateAirplaneResult = (inputs) => {
                    const { L, W, H, Qty, Paper, Board, PerCarton, Rows, Cols } = inputs;
                    const safePerCarton = PerCarton || 1;

                    const skinL = H * 3 + W * 2 + 4;
                    const skinW = L + H * 4 + 4;
                    const innerArea = ((L * (W + 2 * H)) + W * H * 2) / 10000;
                    const innerWeight = (Paper * 2 + Board) * innerArea;
                    const skinWeight = ((skinL * skinW) / 10000) * (Paper * 2 + Board);
                    const unitWeight = innerWeight + skinWeight;

                    const cartonGrossWeight = (PerCarton * unitWeight / 1000) + 1;
                    const cartonL = L * Rows + 4;
                    const cartonW = W * Cols + 4;
                    const cartonH = PerCarton * 0.3 + 4;
                    const cartonCBM = (cartonL * cartonW * cartonH) / 1000000;
                    const volWeight = (skinL * skinW * cartonH) / volDivisor;
                    const cartonCount = Math.ceil(Qty / safePerCarton);
                    const singleBoxChargeable = Math.max(cartonGrossWeight, volWeight);
                    const totalChargeable = cartonCount * singleBoxChargeable;

                    return {
                        cartonL, cartonW, cartonH, cartonCBM, cartonGrossWeight, volWeight,
                        singleBoxChargeable, totalChargeable
                    };
                };

                const calculateFoldMagResult = (inputs) => {
                    const { L, W, H, Qty, Paper, Board, PerCarton, Rows } = inputs;
                    const safeRows = Rows || 1;
                    const safePerCarton = PerCarton || 1;
                    const boxThickness = 0.5;

                    const skinL = L;
                    const skinW = W * 2 + H * 3;
                    const sideArea = (W * H * 2) / 10000;
                    const linkArea = (H * 5 * 4) / 10000;
                    const unitWeight = ((skinL * skinW) / 10000 + sideArea) * (Paper * 2 + Board) + linkArea * 700;

                    const cartonGrossWeight = (PerCarton * unitWeight / 1000) + 1;
                    const cartonL = skinL * safeRows + 6;
                    const cartonW = skinW + 6;
                    const cartonH = (PerCarton * boxThickness / safeRows) + 6;
                    const cartonCBM = (cartonL * cartonW * cartonH) / 1000000;
                    const volWeight = (cartonL * cartonW * cartonH) / volDivisor;
                    const cartonCount = Math.ceil(Qty / safePerCarton);
                    const singleBoxChargeable = Math.max(cartonGrossWeight, volWeight);
                    const totalChargeable = cartonCount * singleBoxChargeable;

                    return {
                        cartonL, cartonW, cartonH, cartonCBM, cartonGrossWeight, volWeight,
                        singleBoxChargeable, totalChargeable
                    };
                };

                const evaluateCandidate = (result, config) => {
                    const sortedDims = [result.cartonL, result.cartonW, result.cartonH].sort((a, b) => b - a);
                    updateDiagnosticStats(result);
                    const fitsConstraints =
                        sortedDims[0] <= sortedLimits[0] &&
                        sortedDims[1] <= sortedLimits[1] &&
                        sortedDims[2] <= sortedLimits[2] &&
                        result.cartonGrossWeight <= maxWeight &&
                        result.volWeight <= maxVolWeight;

                    if (!fitsConstraints) return;

                    const candidate = { ...result, config };

                    if (isBetterCandidate(candidate, bestFallback)) {
                        bestFallback = candidate;
                    }

                    if (candidate.singleBoxChargeable >= minChargeable && isBetterCandidate(candidate, bestQualified)) {
                        bestQualified = candidate;
                    }
                };

                if (activeTab === 'foldable_magnet') {
                    const { L } = foldMagInputs;
                    const safeMaxR = Math.max(1, Math.floor((maxEdgeLimit - 6) / L));
                    const safeMaxS = Math.max(1, Math.floor((maxEdgeLimit - 6) / 0.5));

                    for (let r = 1; r <= safeMaxR; r++) {
                        for (let s = 1; s <= safeMaxS; s++) {
                            const count = r * s;
                            if (count === 0) continue;

                            const tempInputs = { ...foldMagInputs, PerCarton: count, Rows: r };
                            evaluateCandidate(calculateFoldMagResult(tempInputs), { PerCarton: count, Rows: r });
                        }
                    }
                } else if (activeTab === 'magnet') {
                    const { L, W, H } = magInputs;
                    const safeMaxR = Math.max(1, Math.floor((maxEdgeLimit - 4) / L));
                    const safeMaxC = Math.max(1, Math.floor((maxEdgeLimit - 4) / W));
                    const safeMaxS = Math.max(1, Math.floor((maxEdgeLimit - 4) / H));

                    for (let r = 1; r <= safeMaxR; r++) {
                        for (let c = 1; c <= safeMaxC; c++) {
                            for (let s = 1; s <= safeMaxS; s++) {
                                const count = r * c * s;
                                if (count === 0) continue;

                                const tempInputs = { ...magInputs, PerCarton: count, Rows: r, Cols: c };
                                evaluateCandidate(calculateMagnetResult(tempInputs), { PerCarton: count, Rows: r, Cols: c });
                            }
                        }
                    }
                } else if (activeTab === 'airplane') {
                    const { L, W } = airInputs;
                    const safeMaxR = Math.max(1, Math.floor((maxEdgeLimit - 4) / L));
                    const safeMaxC = Math.max(1, Math.floor((maxEdgeLimit - 4) / W));
                    const safeMaxCountH = Math.max(1, Math.floor((maxEdgeLimit - 4) / 0.3));

                    for (let r = 1; r <= safeMaxR; r++) {
                        for (let c = 1; c <= safeMaxC; c++) {
                            const maxLayers = Math.floor(safeMaxCountH / (r * c));
                            for (let layers = 1; layers <= maxLayers; layers++) {
                                const count = r * c * layers;
                                if (count === 0) continue;

                                const tempInputs = { ...airInputs, PerCarton: count, Rows: r, Cols: c };
                                evaluateCandidate(calculateAirplaneResult(tempInputs), { PerCarton: count, Rows: r, Cols: c });
                            }
                        }
                    }
                }

                const selected = bestQualified || bestFallback;
                if (!selected) {
                    alert(buildNoPlanMessage());
                    return;
                }

                if (activeTab === 'foldable_magnet') {
                    setFoldMagInputs(prev => ({ ...prev, ...selected.config }));
                } else if (activeTab === 'magnet') {
                    setMagInputs(prev => ({ ...prev, ...selected.config }));
                } else if (activeTab === 'airplane') {
                    setAirInputs(prev => ({ ...prev, ...selected.config }));
                }

                if (selected.singleBoxChargeable < minChargeable) {
                    alert(replaceTemplate(t('belowMinAlert'), {
                        chargeable: selected.singleBoxChargeable.toFixed(2),
                        min: minChargeable,
                    }));
                    return;
                }

                const layoutText = activeTab === 'foldable_magnet'
                    ? (language === 'en'
                        ? `${selected.config.PerCarton} pcs/carton (${selected.config.Rows} ${t('rowUnit')})`
                        : `${selected.config.PerCarton}个/箱 (${selected.config.Rows}${t('rowUnit')})`)
                    : (language === 'en'
                        ? `${selected.config.PerCarton} pcs/carton (${selected.config.Rows} x ${selected.config.Cols})`
                        : `${selected.config.PerCarton}个/箱 (${selected.config.Rows}x${selected.config.Cols})`);

                alert(replaceTemplate(t('optimizeDone'), {
                    mode: modeText,
                    layout: layoutText,
                    chargeable: selected.singleBoxChargeable.toFixed(2),
                    total: selected.totalChargeable.toFixed(2),
                }));
            };

                    const cols = airInputs.Cols || 1;

                    const stack = Math.ceil(count / (rows * cols));

                } else if (activeTab === 'foldable_magnet') {

                    };

            const layoutData = getVisualLayout();

            return (
                <div className="min-h-screen flex flex-col md:flex-row max-w-7xl mx-auto p-4 gap-4">

                                                <span className="text-sm font-bold text-gray-700">智能装箱参数</span>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setShowSettings(!showSettings)} className="text-xs text-blue-600 hover:underline flex items-center gap-1">{showSettings ? '隐藏设置' : '优化限制设置'}</button>
                                                    <button onClick={handleOptimize} className="btn-shine bg-gradient-to-r from-blue-500 to-indigo-600 text-white text-xs px-3 py-1 rounded shadow hover:shadow-lg transform active:scale-95 transition-all flex items-center gap-1">开始智能计算</button>
                                                </div>
                                            </div>
                                            {showSettings && (
                                                <div className="grid grid-cols-2 gap-2 mb-2 p-2 bg-gray-50 rounded border border-gray-100 text-xs animate-fade-in">
                                                    <InputField label="单箱实重上限" value={constraints.maxWeight} onChange={(v)=>setConstraints({...constraints, maxWeight:v})} unit="kg" />
                                                    <InputField label="单箱体积重上限" value={constraints.maxVolWeight} onChange={(v)=>setConstraints({...constraints, maxVolWeight:v})} unit="kg" />
                                                    <InputField label="单箱长度上限" value={constraints.maxL} onChange={(v)=>setConstraints({...constraints, maxL:v})} unit="cm" />
                                                    <InputField label="单箱宽度上限" value={constraints.maxW} onChange={(v)=>setConstraints({...constraints, maxW:v})} unit="cm" />
                                                    <InputField label="单箱高度上限" value={constraints.maxH} onChange={(v)=>setConstraints({...constraints, maxH:v})} unit="cm" />
                                                    <InputField label="单箱计费重下限" value={constraints.minChargeable} onChange={(v)=>setConstraints({...constraints, minChargeable:v})} unit="kg" />
                                                </div>
                                            )}
                                            <div className="grid grid-cols-2 gap-2">
                                                <InputField label="单箱个数 (G2)" value={foldMagInputs.PerCarton} onChange={(v)=>setFoldMagInputs({...foldMagInputs, PerCarton:v})} unit="pcs" />
                                                <InputField label="单箱排数 (H2)" value={foldMagInputs.Rows} onChange={(v)=>setFoldMagInputs({...foldMagInputs, Rows:v})} unit={t('rowUnit')} />
                                            </div>
                                            <div className="col-span-2 text-xs text-gray-500 mt-1">*注：此盒型为单列排布，仅支持调节排数(长)和堆叠层数(高)。</div>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'card' && (
                                    <div className="grid grid-cols-2 gap-4">
                                         <div className="col-span-2 text-sm text-yellow-600 bg-yellow-50 p-2 rounded">卡盒模式暂不支持详细内部堆叠可视化，仅显示外箱体积。</div>
                                        <InputField label="长 (A19)" value={cardInputs.L} onChange={(v)=>setCardInputs({...cardInputs, L:v})} unit="m" step="0.01" />
                                        <InputField label="宽 (B19)" value={cardInputs.W} onChange={(v)=>setCardInputs({...cardInputs, W:v})} unit="m" step="0.01" />
                                        <InputField label="高 (C19)" value={cardInputs.H} onChange={(v)=>setCardInputs({...cardInputs, H:v})} unit="m" step="0.01" />
                                        <InputField label="数量 (D19)" value={cardInputs.Qty} onChange={(v)=>setCardInputs({...cardInputs, Qty:v})} unit="pcs" />
                                        <InputField label="面纸重" value={cardInputs.Paper} onChange={(v)=>setCardInputs({...cardInputs, Paper:v})} unit="kg" step="0.1" />
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Results */}
                        <div className="bg-white rounded-xl shadow-lg p-6">
                            <h2 className="text-lg font-bold text-gray-800 mb-2 border-b pb-2 flex justify-between items-center">
                                <span>{t('calcResults')}</span>
                                <button 
                                    onClick={handleCopy}
                                    className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded flex items-center gap-1 transition-colors relative"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                                    {copyFeedback || t('copyInquiry')}
                                </button>
                            </h2>
                             <div className="grid grid-cols-2 md:grid-cols-3 gap-3 text-sm">
                                {activeTab === 'magnet' && (
                                    <>
                                        <ResultItem label="单盒重" value={magResults.unitWeight} unit="g" />
                                        <ResultItem label="单箱实重" value={magResults.cartonGrossWeight} unit="kg" />
                                        <ResultItem label="单箱长" value={magResults.cartonL} unit="cm" />
                                        <ResultItem label="单箱宽" value={magResults.cartonW} unit="cm" />
                                        <ResultItem label="单箱高" value={magResults.cartonH} unit="cm" />
                                        <ResultItem label="单箱立方" value={magResults.cartonCBM} unit="m³" />
                                        <ResultItem label="体积重" value={magResults.volWeight} unit="kg" />
                                        <div className="col-span-2 md:col-span-3 mt-1 grid grid-cols-2 gap-3">
                                            <ResultItem label="总箱数" value={magResults.cartonCount} unit={t('boxUnit')} highlight />
                                            <ResultItem label="总体积" value={magResults.totalVolume} unit="m³" highlight />
                                            <ResultItem label="总实重" value={magResults.totalGrossWeight} unit="kg" highlight extraClass="bg-green-50 border-green-200 text-green-700" />
                                            <ResultItem label="总体积重" value={magResults.totalVolWeight} unit="kg" highlight extraClass="bg-blue-50 border-blue-200 text-blue-700" />
                                        </div>
                                    </>
                                )}
                                {activeTab === 'airplane' && (
                                    <>
                                        <ResultItem label="单盒重" value={airResults.unitWeight} unit="g" />
                                        <ResultItem label="单箱实重" value={airResults.cartonGrossWeight} unit="kg" />
                                        <ResultItem label="单箱长" value={airResults.skinL} unit="cm" />
                                        <ResultItem label="单箱宽" value={airResults.skinW} unit="cm" />
                                        <ResultItem label="单箱高" value={airResults.cartonH} unit="cm" />
                                        <ResultItem label="单箱立方" value={airResults.cartonCBM} unit="m³" />
                                        <ResultItem label="体积重" value={airResults.volWeight} unit="kg" />
                                        <div className="col-span-2 md:col-span-3 mt-1 grid grid-cols-2 gap-3">
                                            <ResultItem label="总箱数" value={airResults.cartonCount} unit={t('boxUnit')} highlight />
                                            <ResultItem label="总体积" value={airResults.totalVolume} unit="m³" highlight />
                                            <ResultItem label="总实重" value={airResults.totalGrossWeight} unit="kg" highlight extraClass="bg-green-50 border-green-200 text-green-700" />
                                            <ResultItem label="总体积重" value={airResults.totalVolWeight} unit="kg" highlight extraClass="bg-blue-50 border-blue-200 text-blue-700" />
                                        </div>
                                    </>
                                )}
                                {activeTab === 'foldable_magnet' && (
                                    <>
                                        <ResultItem label="单盒重" value={foldMagResults.unitWeight} unit="g" />
                                        <ResultItem label="单箱实重" value={foldMagResults.cartonGrossWeight} unit="kg" />
                                        <ResultItem label="单箱长" value={foldMagResults.cartonL} unit="cm" />
                                        <ResultItem label="单箱宽" value={foldMagResults.cartonW} unit="cm" />
                                        <ResultItem label="单箱高" value={foldMagResults.cartonH} unit="cm" />
                                        <ResultItem label="单箱立方" value={foldMagResults.cartonCBM} unit="m³" />
                                        <ResultItem label="体积重" value={foldMagResults.volWeight} unit="kg" />
                                        <div className="col-span-2 md:col-span-3 mt-1 grid grid-cols-2 gap-3">
                                            <ResultItem label="总箱数" value={foldMagResults.cartonCount} unit={t('boxUnit')} highlight />
                                            <ResultItem label="总体积" value={foldMagResults.totalVolume} unit="m³" highlight />
                                            <ResultItem label="总实重" value={foldMagResults.totalGrossWeight} unit="kg" highlight extraClass="bg-green-50 border-green-200 text-green-700" />
                                            <ResultItem label="总体积重" value={foldMagResults.totalVolWeight} unit="kg" highlight extraClass="bg-blue-50 border-blue-200 text-blue-700" />
                                        </div>
                                    </>
                                )}
                                {activeTab === 'card' && (
                                    <>
                                        <ResultItem label="单箱长" value={cardResults.cartonL} unit="m" />
                                        <ResultItem label="单箱宽" value={cardResults.cartonW} unit="m" />
                                        <ResultItem label="总重量" value={cardResults.totalWeightRaw} unit="kg" />
                                        <div className="col-span-2 md:col-span-3 mt-1 grid grid-cols-2 gap-3">
                                            <ResultItem label="箱数" value={cardResults.cartonCount} unit={t('boxUnit')} highlight />
                                            <ResultItem label="总重" value={cardResults.totalGrossWeight} unit="kg" highlight />
                                            <ResultItem label="总计费重" value={cardResults.totalChargeableWeight} unit="kg" highlight extraClass="bg-yellow-50 border-yellow-200 text-yellow-700" />
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Right Panel: 3D Visualization */}
                    <div className="w-full md:w-1/2 flex flex-col">
                        <div className="bg-white rounded-xl shadow-lg overflow-hidden flex flex-col h-auto">
                            <div className="p-3 border-b flex justify-between items-center bg-gray-50">
                                <h3 className="font-bold text-gray-700 flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="lucide lucide-box"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" x2="12" y1="22.08" y2="12"/></svg>
                                    {t('visualPreview')}
                                </h3>
                                <div className="flex items-center gap-2">
                                    <span className="text-xs text-gray-400">{t('previewLegend')}</span>
                                    <button 
                                        onClick={() => setIsFullScreen(!isFullScreen)}
                                        className="text-gray-500 hover:text-blue-600 p-1"
                                        title={isFullScreen ? t('fullscreenExit') : t('fullscreenEnter')}
                                    >
                                        {isFullScreen ? (
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>
                                        ) : (
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
                                        )}
                                    </button>
                                </div>
                            </div>
                            
                            {/* 3D Canvas Container */}
                            <div className={`${isFullScreen ? 'fullscreen-canvas' : 'h-80 w-full'} canvas-container relative transition-all duration-300`}>
                                <Canvas>
                                    <PackingScene layout={layoutData} />
                                </Canvas>
                                
                                {isFullScreen && (
                                    <button 
                                        onClick={() => setIsFullScreen(false)}
                                        className="absolute top-4 right-4 bg-white/90 p-2 rounded-full shadow-lg hover:bg-white transition-all z-50"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                    </button>
                                )}

                                <div className="absolute bottom-2 right-2 text-[10px] text-gray-500 bg-white/90 px-2 py-1 rounded border shadow-sm pointer-events-none">
                                    {t('previewHint')}{isFullScreen && t('previewHintEsc')}
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
